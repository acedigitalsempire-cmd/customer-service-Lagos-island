name: Daily Lagos Island Job Alert

on:
  # Run every day at 7:00 AM UTC = 8:00 AM Nigeria Time (WAT = UTC+1)
  schedule:
    - cron: "0 7 * * *"

  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      debug:
        description: "Enable verbose debug logging"
        required: false
        default: "false"

jobs:
  send-job-alert:
    name: Scrape & Send Job Alert
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Check out the repo ───────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install dependencies ─────────────────────────────────────────────
      - name: Install Dependencies
        run: pip install -r requirements.txt

      # ── 4. Run the alert system ─────────────────────────────────────────────
      - name: Run Job Alert
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          RECEIVER_EMAIL: "jobhauntgithub@gmail.com"
        run: python main.py

      # ── 5. Upload CSV as artifact (optional audit trail) ────────────────────
      - name: Upload Job CSV Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: job-results-${{ github.run_id }}
          path: "jobs_*.csv"
          if-no-files-found: ignore
          retention-days: 7

      # ── 6. Upload log ───────────────────────────────────────────────────────
      - name: Upload Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: log-${{ github.run_id }}
          path: job_alert.log
          if-no-files-found: ignore
          retention-days: 7
